name: Android Build

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "*.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - "proguard-rules.pro"
      - ".github/workflows/android-build.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Test and build APKs
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.9"

      - name: Test, lint, and build
        run: gradle --no-daemon --stacktrace testDebugUnitTest lintDebug assembleDebug assembleRelease

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: HeyWear-debug-${{ github.sha }}
          path: build/outputs/apk/debug/HeyWear-debug.apk
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

      - name: Upload unsigned release APK
        uses: actions/upload-artifact@v7
        with:
          name: HeyWear-release-unsigned-${{ github.sha }}
          path: build/outputs/apk/release/HeyWear-release-unsigned.apk
          if-no-files-found: error
          retention-days: 14
          compression-level: 0
